<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        margin: 0;
        padding: 20px;
        font-family: monospace;
        background: #f0f0f0;
      }
    </style>
  </head>
  <body>
    <div
      style="
        width: 720px;
        height: 480px;
        margin: 2px 2px 2px 2px;
        padding: 0px 0px 0px 0px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        border: 1px solid #000000;
      "
    >
      <span style="color: rgba(255, 0, 0, 1)">Hello world!</span
      ><span style="color: rgba(0, 0, 255, 1)">Hello again!</span>
      <div
        style="
          width: 119px;
          height: 10px;
          display: flex;
          justify-content: center;
          align-items: center;
        "
      >
        <div
          style="
            width: 500px;
            height: 30px;
            margin: 0px 0px 0px 0px;
            padding: 0px 0px 0px 0px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 0, 0, 1);
          "
        >
          <span style="color: rgba(0, 255, 0, 1)">Inner</span>
        </div>
      </div>
    </div>
  </body>
</html>

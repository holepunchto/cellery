<!doctype html>
<html>
  <head>
    <title>Streaming UI</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        padding: 2rem;
      }
      .container {
        display: flex;
        gap: 1rem;
        align-items: center;
      }
      button {
        padding: 0.5rem 1rem;
        font-size: 1rem;
        cursor: pointer;
      }
      span {
        font-size: 1.2rem;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script type="module">
      import { Container, Button, Text, Backend, HTMLAdapter } from './ui.js'

      // Build the UI tree
      const container = new Container({ id: 'main' })
      const button = container.addChild(new Button({ id: 'btn1', label: 'Click me' }))
      const text = container.addChild(new Text({ id: 'txt1', content: 'Count: 0' }))

      // Backend maintains click count
      const backend = new Backend()
      backend.store.clickCount = 0

      backend.when({ source: 'btn1', event: 'click' }, function () {
        this.store.clickCount++
        this.push({
          target: 'txt1',
          payload: { content: 'Count: ' + this.store.clickCount }
        })
      })

      // Adapter renders to DOM and captures events
      const adapter = new HTMLAdapter(document.getElementById('app'), container)

      // Wire it all up:
      // adapter events → container → backend
      // backend updates → container → adapter re-renders
      adapter.pipe(container).pipe(backend).pipe(container).pipe(adapter)
    </script>
  </body>
</html>
